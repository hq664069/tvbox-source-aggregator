name: Sync Upstream

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 0 点自动同步上游
  workflow_dispatch:      # 支持手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/riowang88/tvbox-source-aggregator.git
          git fetch upstream main

      - name: Merge upstream into your branch
        run: |
          git config --global user.name "hq664069"
          git config --global user.email "lhanzbs855@gmail.com"
          git merge upstream/main --no-edit || true

      - name: Push merged changes back
        run: git push origin main
